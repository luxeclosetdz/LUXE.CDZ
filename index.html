<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUXE.CLOSET</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
margin:0;
}

header{
text-align:center;
padding:20px;
font-size:24px;
color:#9CAF88;
text-shadow:0 0 10px #9CAF88;
}

.container{
padding:15px;
}

.card{
background:#111;
border-radius:20px;
padding:15px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(156,175,136,0.4);
}

.img-box{
width:100%;
height:250px;
overflow:hidden;
border-radius:15px;
}

.img-box img{
width:100%;
height:100%;
object-fit:cover;
}

.price{
color:#9CAF88;
font-size:20px;
}

.old{
text-decoration:line-through;
color:gray;
}

/* ZARA sizes */
.sizes button{
padding:10px 15px;
margin:5px;
border:1px solid #555;
background:transparent;
color:white;
border-radius:8px;
cursor:pointer;
}

.sizes button.active{
background:#9CAF88;
color:black;
box-shadow:0 0 10px #9CAF88;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#9CAF88;
color:black;
font-weight:bold;
margin-top:10px;
}
</style>

</head>

<body>

<header>LUXE.CLOSET.DZ</header>

<div class="container">

<!-- المنتج 1 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt1.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2600 DA</span>
<div class="price">2200 DA</div>

<div id="sizes-1" class="sizes">
<button onclick="selectSize(this,'S',1)">S</button>
<button onclick="selectSize(this,'M',1)">M</button>
<button onclick="selectSize(this,'L',1)">L</button>
</div>

<button id="orderBtn-1"
onclick="goOrder('T-shirt','https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt1.jpg','2200 DA',1)">
🛒 اطلب الآن
</button>
</div>

<!-- المنتج 2 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt2.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2600 DA</span>
<div class="price">2200 DA</div>

<div id="sizes-2" class="sizes">
<button onclick="selectSize(this,'S',2)">S</button>
<button onclick="selectSize(this,'M',2)">M</button>
<button onclick="selectSize(this,'L',2)">L</button>
</div>

<button id="orderBtn-2"
onclick="goOrder('T-shirt','https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt2.jpg','2200 DA',2)">
🛒 اطلب الآن
</button>
</div>

<!-- المنتج 3 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt3.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2600 DA</span>
<div class="price">2200 DA</div>

<div id="sizes-3" class="sizes">
<button onclick="selectSize(this,'S',3)">S</button>
<button onclick="selectSize(this,'M',3)">M</button>
<button onclick="selectSize(this,'L',3)">L</button>
</div>

<button id="orderBtn-3"
onclick="goOrder('T-shirt','https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt3.jpg','2200 DA',3)">
🛒 اطلب الآن
</button>
</div>

<!-- المنتج 4 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt4.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2600 DA</span>
<div class="price">2200 DA</div>

<div id="sizes-4" class="sizes">
<button onclick="selectSize(this,'S',4)">S</button>
<button onclick="selectSize(this,'M',4)">M</button>
<button onclick="selectSize(this,'L',4)">L</button>
</div>

<button id="orderBtn-4"
onclick="goOrder('T-shirt','https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt4.jpg','2200 DA',4)">
🛒 اطلب الآن
</button>
</div>

</div>

<script>
function selectSize(btn, size, productId){

document.querySelectorAll(`#sizes-${productId} button`).forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

document.getElementById(`orderBtn-${productId}`).dataset.size = size;
}

function goOrder(name, img, price, productId){

let size = document.getElementById(`orderBtn-${productId}`).dataset.size;

if(!size){
alert("اختار المقاس أولاً!");
return;
}

window.location.href =
`order.html?name=${name}&img=${img}&price=${price}&size=${size}`;
}
</script>

</body>
  </html>
