<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LUXE.CLOSET</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
margin:0;
}

header{
text-align:center;
padding:20px;
font-size:24px;
color:#9CAF88;
text-shadow:0 0 10px #9CAF88;
}

.container{
padding:15px;
}

.card{
background:#111;
border-radius:20px;
padding:15px;
margin-bottom:25px;
box-shadow:0 0 20px rgba(156,175,136,0.4);
opacity:0;
transform:translateY(30px);
animation:fadeUp 0.6s ease forwards;
}

.card:nth-child(1){animation-delay:0.2s;}
.card:nth-child(2){animation-delay:0.4s;}
.card:nth-child(3){animation-delay:0.6s;}
.card:nth-child(4){animation-delay:0.8s;}

@keyframes fadeUp{
to{opacity:1; transform:translateY(0);}
}

.img-box{
width:100%;
height:250px;
overflow:hidden;
border-radius:15px;
}

.img-box img{
width:100%;
height:100%;
object-fit:cover;
transition:0.4s;
}

.img-box:hover img{
transform:scale(1.1);
}

.price{
color:#9CAF88;
font-size:20px;
}

.old{
text-decoration:line-through;
color:gray;
}

.sizes button{
padding:10px 15px;
margin:5px;
border:1px solid #555;
background:transparent;
color:white;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.sizes button.active{
background:#9CAF88;
color:black;
box-shadow:0 0 15px #9CAF88;
transform:scale(1.1);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#9CAF88;
color:black;
font-weight:bold;
margin-top:10px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #9CAF88;}
50%{box-shadow:0 0 25px #9CAF88;}
100%{box-shadow:0 0 10px #9CAF88;}
}
  .top-bar{
text-align:center;
padding:10px;
font-size:16px;
font-weight:bold;
color:#9CAF88;
background:#111;
letter-spacing:1px;
box-shadow:0 0 15px #9CAF88;
animation:glowText 1.5s infinite alternate;
}

@keyframes glowText{
from{
text-shadow:0 0 5px #9CAF88, 0 0 10px #9CAF88;
}
to{
text-shadow:0 0 20px #9CAF88, 0 0 40px #9CAF88;
}
  }
  .top-bar{
overflow:hidden;
white-space:nowrap;
}

.top-bar::after{
content:"🚚 توصيل 69 ولاية 🌟 🚚 توصيل 69 ولاية 🌟 🚚 توصيل 69 ولاية 🌟";
display:inline-block;
padding-left:100%;
animation:moveText 10s linear infinite;
}

@keyframes moveText{
from{transform:translateX(0);}
to{transform:translateX(-100%);}
  }
</style>

</head>

<body>
  
<header>LUXE.CLOSET.DZ</header>

<div class="container">
  

<!-- المنتج 1 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt1.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2500 DA</span>
<div class="price">1900 DA</div>

<div id="sizes-1" class="sizes">
<button onclick="selectSize(this,'S',1)">S</button>
<button onclick="selectSize(this,'M',1)">M</button>
<button onclick="selectSize(this,'L',1)">L</button>
</div>

<button id="orderBtn-1"
data-name="T-shirt"
data-img="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt1.jpg"
data-price="1900 DA"
onclick="goOrder(this,1)">
🛒 اطلب الآن
</button>
</div>

<!-- المنتج 2 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt2.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2500 DA</span>
<div class="price">2200 DA</div>

<div id="sizes-2" class="sizes">
<button onclick="selectSize(this,'S',2)">S</button>
<button onclick="selectSize(this,'M',2)">M</button>
<button onclick="selectSize(this,'L',2)">L</button>
</div>

<button id="orderBtn-2"
data-name="T-shirt"
data-img="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt2.jpg"
data-price="2200 DA"
onclick="goOrder(this,2)">
🛒 اطلب الآن
</button>
</div>

<!-- المنتج 3 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt3.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2400 DA</span>
<div class="price">1900 DA</div>

<div id="sizes-3" class="sizes">
<button onclick="selectSize(this,'S',3)">S</button>
<button onclick="selectSize(this,'M',3)">M</button>
<button onclick="selectSize(this,'L',3)">L</button>
</div>

<button id="orderBtn-3"
data-name="T-shirt"
data-img="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt3.jpg"
data-price="1900 DA"
onclick="goOrder(this,3)">
🛒 اطلب الآن
</button>
</div>

<!-- المنتج 4 -->
<div class="card">
<div class="img-box">
<img src="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt4.jpg">
</div>

<h3>T-shirt</h3>
<span class="old">2500 DA</span>
<div class="price">2200 DA</div>

<div id="sizes-4" class="sizes">
<button onclick="selectSize(this,'S',4)">S</button>
<button onclick="selectSize(this,'M',4)">M</button>
<button onclick="selectSize(this,'L',4)">L</button>
</div>

<button id="orderBtn-4"
data-name="T-shirt"
data-img="https://luxeclosetdz.github.io/LUXE.CDZ/images/tshirt4.jpg"
data-price="2200 DA"
onclick="goOrder(this,4)">
🛒 اطلب الآن
</button>
</div>

</div>

<script>
function selectSize(btn, size, productId){

document.querySelectorAll(`#sizes-${productId} button`).forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

document.getElementById(`orderBtn-${productId}`).dataset.size = size;
}

function goOrder(btn, productId){

let size = btn.dataset.size;

if(!size){
alert("اختار المقاس أولاً!");
return;
}

let name = btn.dataset.name;
let img = btn.dataset.img;
let price = btn.dataset.price;

window.location.href =
`order.html?name=${encodeURIComponent(name)}&img=${encodeURIComponent(img)}&price=${encodeURIComponent(price)}&size=${encodeURIComponent(size)}`;
}
</script>

</body>
  </html>
