<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إتمام الطلب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Cairo', sans-serif;
background:#0a0a0a;
color:white;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(156,175,136,0.4);
}
#productImg{
width:100%;
height:150px;
object-fit:contain;
border-radius:10px;
margin-bottom:10px;
background:#000;
  }

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

button{
background:#9CAF88;
color:black;
padding:15px;
border:none;
width:100%;
border-radius:12px;
font-weight:bold;
box-shadow:0 0 10px #9CAF88;
}
</style>

</head>

<body>

<div class="card">

<img id="productImg">

<h2 id="productName"></h2>
<p id="productPrice"></p>

<input id="name" placeholder="الاسم و اللقب">
<input id="phone" placeholder="رقم الهاتف">
<input id="state" placeholder="الولاية">

<select id="delivery">
<option>توصيل للمنزل</option>
<option>توصيل للمكتب</option>
</select>

<button onclick="send()">تأكيد الطلب عبر واتساب</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const nameP = params.get("name");
const img = params.get("img");
const price = params.get("price");
const size = params.get("size");

document.getElementById("productImg").src = img;
document.getElementById("productName").innerText = nameP;
document.getElementById("productPrice").innerText = price;

function send(){

let msg = `طلب جديد 🔥

🛍 المنتج: ${nameP}
💰 السعر: ${price}
📏 المقاس: ${size}

👤 الاسم: ${name.value}
📞 الهاتف: ${phone.value}
📍 الولاية: ${state.value}
🚚 التوصيل: ${delivery.value}

📸 صورة المنتج:
${window.location.origin}/${img}`;

let link = "https://wa.me/213668086810?text=" + encodeURIComponent(msg);

window.open(link);
}
</script>

</body>
</html>
