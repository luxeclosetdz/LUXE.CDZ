<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إتمام الطلب</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Cairo', sans-serif;
background:#0a0a0a;
color:white;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(156,175,136,0.4);
}
#productImg{
width:100%;
height:150px;
object-fit:contain;
border-radius:10px;
margin-bottom:10px;
background:#000;
  }

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

button{
background:#9CAF88;
color:black;
padding:15px;
border:none;
width:100%;
border-radius:12px;
font-weight:bold;
box-shadow:0 0 10px #9CAF88;
}
 body{
opacity:0;
animation:fadeIn 0.6s ease forwards;
}

@keyframes fadeIn{
to{opacity:1;}
  }
  .card{
transform:translateY(40px);
opacity:0;
animation:cardUp 0.6s ease forwards;
animation-delay:0.3s;
}

@keyframes cardUp{
to{
transform:translateY(0);
opacity:1;
}
  }
  #productImg{
animation:zoomIn 0.5s ease;
}

@keyframes zoomIn{
from{transform:scale(0.8);}
to{transform:scale(1);}
  }
  input, select{
opacity:0;
transform:translateX(-20px);
animation:slideIn 0.5s ease forwards;
}

input:nth-child(1){animation-delay:0.4s;}
input:nth-child(2){animation-delay:0.5s;}
input:nth-child(3){animation-delay:0.6s;}
select{animation-delay:0.7s;}

@keyframes slideIn{
to{
opacity:1;
transform:translateX(0);
}
  }
  button{
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #9CAF88;
}

button{
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #9CAF88;}
50%{box-shadow:0 0 25px #9CAF88;}
100%{box-shadow:0 0 10px #9CAF88;}
  }
  input:focus, select:focus{
outline:none;
box-shadow:0 0 10px #9CAF88;
  }
  
</style>

</head>

<body>

<div class="card">

<img id="productImg">

<h2 id="productName"></h2>
<p id="productPrice"></p>

<input id="name" placeholder="الاسم و اللقب">
<input id="phone" placeholder="رقم الهاتف">
<input id="state" placeholder="الولاية">

<select id="delivery">
<option>توصيل للمنزل</option>
<option>توصيل للمكتب</option>
</select>

<button onclick="send()">تأكيد الطلب عبر واتساب</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const nameP = params.get("name");
const img = params.get("img");
const price = params.get("price");
const size = params.get("size");

 document.getElementById("productImg").src = img;
document.getElementById("productName").innerText = name;
document.getElementById("productPrice").innerText = price;

function send(){

let userName = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let state = document.getElementById("state").value;
let delivery = document.getElementById("delivery").value;

let msg = `طلب جديد 🔥

🛍 المنتج: ${nameP}
💰 السعر: ${price}
📏 المقاس: ${size}

👤 الاسم: ${userName}
📞 الهاتف: ${phone}
📍 الولاية: ${state}
🚚 التوصيل: ${delivery}

📸 صورة المنتج:
${img}`;

let link = "https://wa.me/213668086810?text=" + encodeURIComponent(msg);

window.open(link);
  }
</script>

</body>
</html>
