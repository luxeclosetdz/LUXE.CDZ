 <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إتمام الطلب</title>

<style>
body{
font-family:Arial;
background:#0a0a0a;
color:white;
padding:20px;
opacity:0;
animation:fadeIn 0.6s forwards;
}

@keyframes fadeIn{
to{opacity:1;}
}

.card{
background:#111;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px #9CAF88;
transform:translateY(40px);
opacity:0;
animation:cardUp 0.6s forwards;
animation-delay:0.3s;
}

@keyframes cardUp{
to{
transform:translateY(0);
opacity:1;
}
}

#productImg{
width:100%;
height:180px;
object-fit:contain;
border-radius:10px;
margin-bottom:10px;
animation:zoomIn 0.5s;
}

@keyframes zoomIn{
from{transform:scale(0.8);}
to{transform:scale(1);}
}

input, select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
opacity:0;
transform:translateX(-20px);
animation:slideIn 0.5s forwards;
}

input:nth-child(4){animation-delay:0.4s;}
input:nth-child(5){animation-delay:0.5s;}
input:nth-child(6){animation-delay:0.6s;}
select{animation-delay:0.7s;}

@keyframes slideIn{
to{
opacity:1;
transform:translateX(0);
}
}

input:focus, select:focus{
outline:none;
box-shadow:0 0 10px #9CAF88;
}

button{
background:#9CAF88;
color:black;
padding:15px;
border:none;
width:100%;
border-radius:12px;
font-weight:bold;
margin-top:10px;
transition:0.3s;
animation:pulse 2s infinite;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px #9CAF88;
}

@keyframes pulse{
0%{box-shadow:0 0 10px #9CAF88;}
50%{box-shadow:0 0 25px #9CAF88;}
100%{box-shadow:0 0 10px #9CAF88;}
}

.info{
margin:5px 0;
color:#9CAF88;
}
</style>

</head>

<body>

<div class="card">

<img id="productImg">

<h2 id="productName"></h2>
<p id="productPrice" class="info"></p>
<p id="productSize" class="info"></p>

<input id="name" placeholder="الاسم و اللقب">
<input id="phone" placeholder="رقم الهاتف">
<input id="state" placeholder="الولاية">

<select id="delivery">
<option>توصيل للمنزل</option>
<option>توصيل للمكتب</option>
</select>

<button onclick="send()">🛒 تأكيد الطلب عبر واتساب</button>

</div>

<script>
const params = new URLSearchParams(window.location.search);

const nameP = params.get("name") || "منتج";
const img = params.get("img") || "";
const price = params.get("price") || "";
const size = params.get("size") || "";
  
document.getElementById("productImg").src = img;
document.getElementById("productName").innerText = nameP;
document.getElementById("productPrice").innerText = "💰 " + price;
document.getElementById("productSize").innerText = "📏 المقاس: " + size;
function send(){

let msg =
`🛍️ *طلب جديد - LUXE.CLOSET*

━━━━━━━━━━━━━━━

📦 *المنتج:* ${nameP}
💰 *السعر:* ${price}
📏 *المقاس:* ${size}

━━━━━━━━━━━━━━━

👤 *الاسم:* ${name.value}
📞 *الهاتف:* ${phone.value}
📍 *الولاية:* ${state.value}
🚚 *التوصيل:* ${delivery.value}

━━━━━━━━━━━━━━━

📸 *صورة المنتج:*
${img}

━━━━━━━━━━━━━━━
🔥 شكراً لثقتكم في LUXE.CLOSET`;

let link = "https://wa.me/213668086810?text=" + encodeURIComponent(msg);

window.open(link);
  }
</script>

</body>
</html>
